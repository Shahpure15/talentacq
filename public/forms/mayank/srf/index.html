
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent Acquisition and Onboarding</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-wrapper">

    <div class="outer-card">

      <div class="system-title">Talent Acquisition and Onboarding</div>
      <div class="module-title">Staff Requisition Form</div>
      <br>

      <!-- ID + Message -->
  
      
      <!-- Inner Box: just a visual outline around all fields -->
      <div class="inner-box">
        
        <div class="form-body">
    <div class="id-message-row">
        <div class="id-badge">Record ID: <span id="display-id">--</span></div>
        <div id="message" class="message"></div>
      </div>
      <br>
          <div class="form-grid">
            
            
            <div class="form-row">
              <label for="srf-code">SRF Code <span class="required">*</span>
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">A unique code that identifies this Staff Requisition Form.</span></span>
              </label>
              <input type="text" id="srf-code" class="input-sm" maxlength="20" autocomplete="off" oninput="handleCodeInput(this.value)" />
            </div>

            <div class="form-row">
              <label for="demand-id">Demand
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">The business demand this hiring request is linked to.</span></span>
              </label>
              <select id="demand-id" class="input-full">
                <option value="">-- Select Demand --</option>
              </select>
            </div>

            <div class="form-row">
              <label for="role-id">Role <span class="required">*</span>
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">The job role being hired for.</span></span>
              </label>
              <select id="role-id" class="input-full">
                <option value="">-- Select Role --</option>
              </select>
            </div>

            <div class="form-row">
              <label for="grade-id">Grade
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">The salary grade applicable to this role.</span></span>
              </label>
              <select id="grade-id" class="input-full">
                <option value="">-- Select Grade --</option>
              </select>
            </div>

            <div class="form-row">
              <label for="practice-id">Practice
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">The department raising this requisition.</span></span>
              </label>
              <select id="practice-id" class="input-full">
                <option value="">-- Select Practice --</option>
              </select>
            </div>

                 <div class="form-row">
              <label for="ta-owner-id">TA Owner
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">The Talent Acquisition member responsible for this requisition.</span></span>
              </label>
              <select id="ta-owner-id" class="input-full">
                <option value="">-- Select TA Owner --</option>
              </select>
            </div>

            <div class="form-row">
              <label for="hiring-manager-id">Hiring Manager
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">The manager who will make the final hiring decision.</span></span>
              </label>
              <select id="hiring-manager-id" class="input-full">
                <option value="">-- Select Manager --</option>
              </select>
            </div>

      

             

             <div class="form-row">
              <label for="target-join-date">Target Join Date <span class="required">*</span>
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">The date by which the candidate should ideally join.</span></span>
              </label>
              <input type="date" id="target-join-date" class="input-md" />
            </div>



           <div class="form-row">
              <label for="srf-status">SRF Status <span class="required">*</span>
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">Current stage of this requisition.</span></span>
              </label>
              <select id="srf-status" class="input-full">
                <option value="">-- Select Status --</option>
                <option value="Draft">Draft</option>
                <option value="PendingApproval">Pending Approval</option>
                <option value="Approved">Approved</option>
                <option value="Closed">Closed</option>
                <option value="OnHold">On Hold</option>
              </select>
            </div>

          

                <div class="form-row">
              <label for="approval-date">Approval Date
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">Date on which this requisition was approved.</span></span>
              </label>
              <input type="date" id="approval-date" class="input-md" />
            </div>

            <div class="form-row">
              <label for="budget-min">Budget Min (LPA)
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">Minimum annual compensation in Lakhs Per Annum.</span></span>
              </label>
              <input type="number" id="budget-min" class="input-sm" min="0" step="0.1" />
            </div>

               <div class="form-row">
              <label for="number-of-positions">No. of Positions <span class="required">*</span>
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">How many openings need to be filled.</span></span>
              </label>
              <input type="number" id="number-of-positions" class="input-sm" min="1" />
            </div>
      


              <div class="form-row">
              <label for="budget-max">Budget Max (LPA)
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">Maximum annual compensation in Lakhs Per Annum.</span></span>
              </label>
              <input type="number" id="budget-max" class="input-sm" min="0" step="0.1" />
            </div>
           
                    <div class="form-row">
  <label for="currency-code">Currency 
    <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">Currency in which budget is stated.</span></span>
  </label>
  <select id="currency-code" class="input-sm">
    <option value="INR" selected>INR</option>
    <option value="USD">USD</option>
    <option value="GBP">GBP</option>
  </select>

</div>

 

                  

            <!-- Key Skills spans full width -->
            <div class="form-row col-span-2">
              <label for="key-skills">Key Skills
                <span class="info-btn" tabindex="0">ⓘ<span class="tooltip">Primary skills required for this role (comma-separated).</span></span>
              </label>
              <input type="textarea" id="key-skills" class="input-full" maxlength="300" autocomplete="off" />
            </div>

          </div><!-- /form-grid -->
        </div><!-- /form-body -->
      </div><!-- /inner-box -->

    </div><!-- /outer-card -->

    <!-- Buttons OUTSIDE outer card -->
    <div class="bottom-buttons">
      <button id="save-btn" class="btn-save" onclick="handleSave()">Save</button>
      <button class="btn-prev" onclick="handlePrev()">← Prev</button>
      <button class="btn-next" onclick="handleNext()">Next →</button>
      <button class="btn-exit" onclick="handleExit()">Exit</button>
    </div>

  </div><!-- /page-wrapper -->

  <script src="app.js"></script>
</body>
</html>

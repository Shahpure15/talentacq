<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Activity Log</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div class="system-title">Talent Acquisition and Onboarding</div>

  <div class="outer-card">
    <div class="module-title">Onboarding Activity Log</div>

    <div class="mode-toggle-row">
      <span class="mode-label">Sequential Navigation Only</span>
    </div>

    <div class="id-message-row">
      <div class="id-badge">Record ID: <span id="display-id">--</span></div>
      <div id="message" class="message message-placeholder"></div>
    </div>

    <div class="form-body">
<div class="form-row-double">
        <div class="form-col">
          <label for="onboarding-id">Onboarding Ref <span class="required">*</span></label>
          <select id="onboarding-id"></select>
        </div>
        <div class="form-col">
          <label for="activity-id">Activity <span class="required">*</span></label>
          <select id="activity-id"></select>
        </div>
      </div>
      <div class="form-row-double">
        <div class="form-col">
          <label for="assigned-to-employee-id">Assigned To</label>
          <select id="assigned-to-employee-id"></select>
        </div>
        <div class="form-col">
          <label for="status">Status</label>
          <select id="status">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
      </div>
      <div class="form-row-double">
        <div class="form-col">
          <label for="completion-date">Completion Date</label>
          <input type="date" id="completion-date">
        </div>
      </div>
      <div class="form-row-double">
        <div class="form-col">
          <label for="remarks">Remarks</label>
          <textarea id="remarks"></textarea>
        </div>
      </div>
    </div>

    <div class="bottom-buttons">
      <button type="button" class="btn-prev" onclick="handlePrevious()">Previous</button>
      <button type="button" id="save-btn" class="btn-save" onclick="handleSave()">Save</button>
      <button type="button" class="btn-next" onclick="handleNext()">Next</button>
      <button type="button" class="btn-exit" onclick="handleExit()">Exit</button>
    </div>
  </div>

  <script src="../../common.js"></script>
  <script src="app.js"></script>
</body>
</html>

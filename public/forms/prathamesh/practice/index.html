<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice Area</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div class="system-title">Talent Acquisition and Onboarding</div>

  <div class="outer-card">
    <div class="module-title">Practice Area</div>

    <div class="mode-toggle-row">
      <button type="button" id="mode-toggle-btn" class="btn-mode-find" onclick="toggleMode()">Find</button>
      <span id="mode-label" class="mode-label">New Entry</span>
    </div>

    <div class="id-message-row">
      <div class="id-badge">Record ID: <span id="display-id">--</span></div>
      <div id="message" class="message message-placeholder"></div>
    </div>

    <div class="form-body">
<div class="form-row-double">
        <div class="form-col">
          <label for="practice-code">
            Practice Code <span class="required">*</span>
            <span class="info-btn" title="Unique code for this practice area">ⓘ</span>
          </label>
          <input type="text" id="practice-code" oninput="handleCodeInput(this.value)">
        </div>
        <div class="form-col">
          <label for="practice-name">
            Practice Name <span class="required">*</span>
            <span class="info-btn" title="Full name of the practice">ⓘ</span>
          </label>
          <input type="text" id="practice-name">
        </div>
      </div>

      <div class="form-row-double">
        <div class="form-col">
          <label for="practice-head-id">
            Practice Head
            <span class="info-btn" title="Employee heading this practice">ⓘ</span>
          </label>
          <select id="practice-head-id"></select>
        </div>
        <div class="form-col">
          <label for="is-active">
            Status
            <span class="info-btn" title="1 for Active, 0 for Inactive">ⓘ</span>
          </label>
          <select id="is-active">
            <option value="1">1</option>
            <option value="0">0</option>
          </select>
        </div>
      </div>
    </div>

    <div class="bottom-buttons">
      <button type="button" class="btn-prev" onclick="handlePrevious()">Previous</button>
      <button type="button" id="save-btn" class="btn-save" onclick="handleSave()">Save</button>
      <button type="button" class="btn-next" onclick="handleNext()">Next</button>
      <button type="button" class="btn-exit" onclick="handleExit()">Exit</button>
    </div>
  </div>

  <script src="../../common.js"></script>
  <script src="app.js"></script>
</body>
</html>
